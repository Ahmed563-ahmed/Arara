<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arara</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        h1 {
            color: red;
            font-size: 3em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- يمكنك تغيير رابط الصورة بأي صورة أخرى -->
        <img src="https://picsum.photos/id/1015/300/200" alt="صورة منظر طبيعي">
        <h1>Arara</h1>
    </div>
</body>
</html>
